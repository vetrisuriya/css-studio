<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Border-radius generator — CSS Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-tool="radius">
  <header class="shell"><nav class="topbar"><a class="brand" href="index.html"><span>CSS</span> Studio</a><div class="navlinks"><a href="border-image.html">Border image</a><a href="border-radius.html">Radius</a><a href="box-shadow.html">Shadow</a><a href="color-converter.html">Converter</a><a href="color-mixer.html">Mixer</a><a href="shape-generator.html">Shapes</a></div></nav></header>
  <main class="shell">
    <section class="page-head"><p class="kicker">Tool 02</p><h2>Border-radius generator</h2></section>
    <section class="workspace">
      <aside class="controls-card"><div class="controls"><div class="control"><label for="fill">Fill color</label><input id="fill" type="color" value="#d7a941" /></div><p class="label">Horizontal corners</p><div class="control-row"><div class="control"><label>Top left <span class="value" data-output="rtl"></span></label><input id="rtl" class="radius" type="range" min="0" max="160" value="44" /></div><div class="control"><label>Top right <span class="value" data-output="rtr"></span></label><input id="rtr" class="radius" type="range" min="0" max="160" value="96" /></div></div><div class="control-row"><div class="control"><label>Bottom right <span class="value" data-output="rbr"></span></label><input id="rbr" class="radius" type="range" min="0" max="160" value="54" /></div><div class="control"><label>Bottom left <span class="value" data-output="rbl"></span></label><input id="rbl" class="radius" type="range" min="0" max="160" value="112" /></div></div><p class="label">Vertical corners</p><div class="control-row"><div class="control"><label>Top left <span class="value" data-output="otl"></span></label><input id="otl" class="oval" type="range" min="0" max="160" value="96" /></div><div class="control"><label>Top right <span class="value" data-output="otr"></span></label><input id="otr" class="oval" type="range" min="0" max="160" value="44" /></div></div><div class="control-row"><div class="control"><label>Bottom right <span class="value" data-output="obr"></span></label><input id="obr" class="oval" type="range" min="0" max="160" value="128" /></div><div class="control"><label>Bottom left <span class="value" data-output="obl"></span></label><input id="obl" class="oval" type="range" min="0" max="160" value="54" /></div></div></div></aside>
      <section class="panel"><div class="preview-zone"><div id="target" class="target">Preview</div></div><pre id="code" class="code"></pre><button class="button primary copy" type="button">Copy output</button></section>
    </section>
  </main>
  <footer class="shell footer"><span>Created by <a href="https://vetrisuriya.in/" target="_blank" rel="noreferrer">Vetri Suriya</a></span></footer>
  <script src="script.js"></script>
</body>
</html>
