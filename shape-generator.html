<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shape generator — CSS Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-tool="shape">
  <header class="shell"><nav class="topbar"><a class="brand" href="index.html"><span>CSS</span> Studio</a><div class="navlinks"><a href="border-image.html">Border image</a><a href="border-radius.html">Radius</a><a href="box-shadow.html">Shadow</a><a href="color-converter.html">Converter</a><a href="color-mixer.html">Mixer</a><a href="shape-generator.html">Shapes</a></div></nav></header>
  <main class="shell">
    <section class="page-head"><p class="kicker">Tool 06</p><h2>Shape generator</h2></section>
    <section class="workspace">
      <aside class="controls-card"><div class="controls"><div class="control"><label for="shape">Shape</label><select id="shape"><option value="blob">Blob</option><option value="diamond">Diamond</option><option value="triangle">Triangle</option><option value="badge">Badge</option><option value="circle">Circle</option></select></div><div class="control"><label for="shapeColor">Shape color</label><input id="shapeColor" type="color" value="#0f7566" /></div><div class="control-row"><div class="control"><label for="size">Circle size <span class="value" data-output="size"></span>%</label><input id="size" type="range" min="10" max="80" value="45" /></div><div class="control"><label for="posx">X position <span class="value" data-output="posx"></span>%</label><input id="posx" type="range" min="0" max="100" value="50" /></div></div><div class="control"><label for="posy">Y position <span class="value" data-output="posy"></span>%</label><input id="posy" type="range" min="0" max="100" value="50" /></div></div></aside>
      <section class="panel"><div class="preview-zone"><div id="target" class="target">Preview</div></div><pre id="code" class="code"></pre><button class="button primary copy" type="button">Copy output</button></section>
    </section>
  </main>
  <footer class="shell footer"><span>Created by <a href="https://vetrisuriya.in/" target="_blank" rel="noreferrer">Vetri Suriya</a></span></footer>
  <script src="script.js"></script>
</body>
</html>
