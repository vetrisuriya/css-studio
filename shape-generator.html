<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shape generator — CSS Studio</title><link rel="stylesheet" href="styles.css"></head><body data-tool="shape"><main class="shell"><nav class="topbar"><a class="brand" href="index.html"><span>CSS</span> Studio</a><div class="navlinks"><a href="border-image.html">Border</a><a href="color-mixer.html">Mixer</a></div></nav><section class="section-heading"><p class="eyebrow">Tool 06</p><h2>Shape generator</h2></section><section class="workspace"><div class="work-card controls"><div class="control"><label>Shape</label><select id="shape"><option value="blob">Royal blob</option><option value="diamond">Diamond</option><option value="triangle">Triangle</option><option value="badge">Badge</option><option value="circle">Circle</option></select></div><div class="control"><label>Shape color</label><input id="shapeColor" type="color" value="#0b7a63"></div><div class="inline"><div class="control"><label>Circle size</label><input id="size" type="range" min="10" max="80" value="45"></div><div class="control"><label>X position</label><input id="posx" type="range" min="0" max="100" value="50"></div></div><div class="control"><label>Y position</label><input id="posy" type="range" min="0" max="100" value="50"></div></div><div class="panel"><div class="preview-zone"><div id="target" class="target">Shape</div></div><pre id="code" class="code"></pre><button class="button primary copy">Copy CSS</button></div></section></main><script src="script.js"></script></body></html>
