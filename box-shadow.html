<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Box-shadow generator — CSS Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-tool="shadow">
  <header class="shell"><nav class="topbar"><a class="brand" href="index.html"><span>CSS</span> Studio</a><div class="navlinks"><a href="border-image.html">Border image</a><a href="border-radius.html">Radius</a><a href="box-shadow.html">Shadow</a><a href="color-converter.html">Converter</a><a href="color-mixer.html">Mixer</a><a href="shape-generator.html">Shapes</a></div></nav></header>
  <main class="shell">
    <section class="page-head"><p class="kicker">Tool 03</p><h2>Box-shadow generator</h2></section>
    <section class="workspace">
      <aside class="controls-card"><div class="controls"><div class="control"><label class="check-label"><input id="on1" type="checkbox" checked /> Enable layer 1</label><label class="check-label"><input id="inset1" type="checkbox" /> Inset layer 1</label></div><div class="control-row"><div class="control"><label>X <span class="value" data-output="x1"></span>px</label><input id="x1" type="range" min="-80" max="80" value="10" /></div><div class="control"><label>Y <span class="value" data-output="y1"></span>px</label><input id="y1" type="range" min="-80" max="80" value="14" /></div></div><div class="control-row"><div class="control"><label>Blur <span class="value" data-output="blur1"></span>px</label><input id="blur1" type="range" min="0" max="140" value="36" /></div><div class="control"><label>Spread <span class="value" data-output="spread1"></span>px</label><input id="spread1" type="range" min="-60" max="60" value="-4" /></div></div><div class="control-row"><div class="control"><label>Color</label><input id="sc1" type="color" value="#000000" /></div><div class="control"><label>Opacity <span class="value" data-output="alpha1"></span></label><input id="alpha1" type="range" min="0" max="1" step="0.01" value="0.42" /></div></div><div class="control"><label class="check-label"><input id="on2" type="checkbox" checked /> Enable layer 2</label><label class="check-label"><input id="inset2" type="checkbox" /> Inset layer 2</label></div><div class="control-row"><div class="control"><label>X <span class="value" data-output="x2"></span>px</label><input id="x2" type="range" min="-80" max="80" value="20" /></div><div class="control"><label>Y <span class="value" data-output="y2"></span>px</label><input id="y2" type="range" min="-80" max="80" value="28" /></div></div><div class="control-row"><div class="control"><label>Blur <span class="value" data-output="blur2"></span>px</label><input id="blur2" type="range" min="0" max="140" value="54" /></div><div class="control"><label>Spread <span class="value" data-output="spread2"></span>px</label><input id="spread2" type="range" min="-60" max="60" value="-8" /></div></div><div class="control-row"><div class="control"><label>Color</label><input id="sc2" type="color" value="#000000" /></div><div class="control"><label>Opacity <span class="value" data-output="alpha2"></span></label><input id="alpha2" type="range" min="0" max="1" step="0.01" value="0.34" /></div></div><div class="control"><label class="check-label"><input id="on3" type="checkbox" checked /> Enable layer 3</label><label class="check-label"><input id="inset3" type="checkbox" /> Inset layer 3</label></div><div class="control-row"><div class="control"><label>X <span class="value" data-output="x3"></span>px</label><input id="x3" type="range" min="-80" max="80" value="30" /></div><div class="control"><label>Y <span class="value" data-output="y3"></span>px</label><input id="y3" type="range" min="-80" max="80" value="42" /></div></div><div class="control-row"><div class="control"><label>Blur <span class="value" data-output="blur3"></span>px</label><input id="blur3" type="range" min="0" max="140" value="72" /></div><div class="control"><label>Spread <span class="value" data-output="spread3"></span>px</label><input id="spread3" type="range" min="-60" max="60" value="-12" /></div></div><div class="control-row"><div class="control"><label>Color</label><input id="sc3" type="color" value="#000000" /></div><div class="control"><label>Opacity <span class="value" data-output="alpha3"></span></label><input id="alpha3" type="range" min="0" max="1" step="0.01" value="0.26" /></div></div></div></aside>
      <section class="panel"><div class="preview-zone"><div id="target" class="target">Preview</div></div><pre id="code" class="code"></pre><button class="button primary copy" type="button">Copy output</button></section>
    </section>
  </main>
  <footer class="shell footer"><span>Ready for GitHub Pages hosting.</span><span>Created by <a href="https://vetrisuriya.in/" target="_blank" rel="noreferrer">Vetri Suriya</a></span></footer>
  <script src="script.js"></script>
</body>
</html>
