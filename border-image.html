<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Border-image generator — CSS Studio</title><link rel="stylesheet" href="styles.css"></head><body data-tool="border-image"><main class="shell"><nav class="topbar"><a class="brand" href="index.html"><span>CSS</span> Studio</a><div class="navlinks"><a href="border-radius.html">Radius</a><a href="box-shadow.html">Shadow</a><a href="color-mixer.html">Mixer</a></div></nav><section class="section-heading"><p class="eyebrow">Tool 01</p><h2>Border-image generator</h2></section><section class="workspace"><div class="work-card controls"><div class="control"><label>Source</label><select id="biSource"><option value="gradient">Royal gradient</option><option value="image">Image URL</option></select></div><div class="control"><label>Image URL</label><input id="imageUrl" value="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=900"></div><div class="inline"><div class="control"><label>Angle</label><input id="angle" type="range" min="0" max="360" value="135"></div><div class="control"><label>Slice</label><input id="slice" type="range" min="1" max="100" value="32"></div></div><div class="inline"><input id="c1" type="color" value="#d5a642"><input id="c2" type="color" value="#9e2456"></div><div class="control"><label>Third color</label><input id="c3" type="color" value="#0b7a63"></div><div class="inline"><div class="control"><label>Border px</label><input id="borderWidth" type="range" min="4" max="60" value="28"></div><div class="control"><label>Image width</label><input id="biWidth" type="range" min="1" max="60" value="28"></div></div><div class="inline"><div class="control"><label>Outset</label><input id="outset" type="range" min="0" max="30" value="0"></div><div class="control"><label>Repeat</label><select id="repeat"><option>stretch</option><option>round</option><option>repeat</option><option>space</option></select></div></div></div><div c
