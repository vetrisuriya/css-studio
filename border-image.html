<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Border-image generator — CSS Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-tool="border-image">
  <header class="shell"><nav class="topbar"><a class="brand" href="index.html"><span>CSS</span> Studio</a><div class="navlinks"><a href="border-image.html">Border image</a><a href="border-radius.html">Radius</a><a href="box-shadow.html">Shadow</a><a href="color-converter.html">Converter</a><a href="color-mixer.html">Mixer</a><a href="shape-generator.html">Shapes</a></div></nav></header>
  <main class="shell">
    <section class="page-head"><p class="kicker">Tool 01</p><h2>Border-image generator</h2></section>
    <section class="workspace">
      <aside class="controls-card"><div class="controls"><div class="control"><label for="biSource">Source</label><select id="biSource"><option value="gradient">Gradient</option><option value="image">Image URL</option></select></div><div class="control"><label for="imageUrl">Image URL</label><input id="imageUrl" value="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=900" /></div><div class="control-row"><div class="control"><label for="angle">Angle <span class="value" data-output="angle"></span></label><input id="angle" type="range" min="0" max="360" value="135" /></div><div class="control"><label for="slice">Slice <span class="value" data-output="slice"></span></label><input id="slice" type="range" min="1" max="100" value="32" /></div></div><div class="control-row"><div class="control"><label for="c1">Color 1</label><input id="c1" type="color" value="#d7a941" /></div><div class="control"><label for="c2">Color 2</label><input id="c2" type="color" value="#8d214f" /></div></div><div class="control"><label for="c3">Color 3</label><input id="c3" type="color" value="#0f7566" /></div><div class="control-row"><div class="control"><label for="borderWidth">Border <span class="value" data-output="borderWidth"></span>px</label><input id="borderWidth" type="range" min="4" max="60" value="24" /></div><div class="control"><label for="biWidth">Width <span class="value" data-output="biWidth"></span></label><input id="biWidth" type="range" min="1" max="60" value="24" /></div></div><div class="control-row"><div class="control"><label for="outset">Outset <span class="value" data-output="outset"></span></label><input id="outset" type="range" min="0" max="30" value="0" /></div><div class="control"><label for="repeat">Repeat</label><select id="repeat"><option>stretch</option><option>round</option><option>repeat</option><option>space</option></select></div></div></div></aside>
      <section class="panel"><div class="preview-zone"><div id="target" class="target">Preview</div></div><pre id="code" class="code"></pre><button class="button primary copy" type="button">Copy output</button></section>
    </section>
  </main>
  <footer class="shell footer"><span>Ready for GitHub Pages hosting.</span><span>Created by <a href="https://vetrisuriya.in/" target="_blank" rel="noreferrer">Vetri Suriya</a></span></footer>
  <script src="script.js"></script>
</body>
</html>
